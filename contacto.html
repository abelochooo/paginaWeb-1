    <h1 id="formulario-titulo">Completa el formulario:</h1>

    <form name="contacto" method="POST" data-netlify="true" class="formulario">

<input type="hidden" name="form-name" value="contacto">

<label>Nombre <span class="obligatorio">*</span></label>
<input type="text" name="nombre" placeholder="Inserta tu nombre completo" required>

<label>Correo electrónico  <span class="obligatorio">*</span></label>
<input type="email" name="email" placeholder="Inserta tu correo." required>

<label>Número de teléfono  <span class="obligatorio">*</span></label>
<input type="tel" name="telefono" placeholder="Inserta tu número de teléfono." required>

<label>Comentarios</label>
<textarea name="comentarios" id="comentarios" placeholder="¿Preguntas? ¿Comentarios?"></textarea>



</form>
